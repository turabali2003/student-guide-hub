<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Student Guide Hub</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

<script>
if (localStorage.getItem("loggedIn") === "true") {
    window.location.href = "index.html";
}
</script>

    <h1 class="site-title">STUDENT GUIDE HUB</h1>
    <img src="logo.png" class="login-logo">
<div class="auth-container">

    <!-- LOGIN FORM -->
    <div id="loginForm">
        <h2>Login</h2>

        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">

        <button onclick="login()">Login</button>

        <p class="switch">
            Don't have an account? 
            <span onclick="showSignup()">Create Account</span>
        </p>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signupForm" style="display:none;">
        <h2>Create Account</h2>

        <input type="text" id="signupUser" placeholder="Username">
        <input type="password" id="signupPass" placeholder="Password">

        <button onclick="signup()">Create Account</button>

        <p class="switch">
            Already have an account? 
            <span onclick="showLogin()">Login</span>
        </p>
    </div>

    <p id="authMessage"></p>

</div>

<script src="script.js"></script>
</body>
</html>
